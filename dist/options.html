<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>B站视频文稿助手 - 设置</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      max-width: 100%;
    }
    h1 {
      color: #00a1d6;
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #333;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #00a1d6;
      box-shadow: 0 0 0 2px rgba(0, 161, 214, 0.2);
    }
    .save-btn {
      background-color: #00a1d6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-top: 10px;
    }
    .save-btn:hover {
      background-color: #0091c2;
    }
    .save-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
    .example {
      background-color: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>B站视频文稿助手 - 设置</h1>
    
    <form id="settingsForm">
      <div class="form-group">
        <label for="apiEndpoint">API端点</label>
        <input type="text" id="apiEndpoint" placeholder="例如: https://api.openai.com/v1/chat/completions">
        <div class="help-text">输入大模型API的完整URL地址</div>
      </div>
      
      <div class="form-group">
        <label for="apiKey">API密钥</label>
        <input type="password" id="apiKey" placeholder="输入您的API密钥">
        <div class="help-text">输入您的API访问密钥</div>
      </div>
      
      <div class="form-group">
        <label for="model">模型选择</label>
        <select id="model" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo (OpenAI)</option>
          <option value="gpt-4">GPT-4 (OpenAI)</option>
          <option value="gpt-4-turbo">GPT-4 Turbo (OpenAI)</option>
          <option value="claude-3-sonnet">Claude-3 Sonnet (Anthropic)</option>
          <option value="claude-3-haiku">Claude-3 Haiku (Anthropic)</option>
          <option value="qwen-turbo">Qwen Turbo (阿里云)</option>
          <option value="qwen-plus">Qwen Plus (阿里云)</option>
          <option value="custom">自定义模型</option>
        </select>
        <div class="help-text">选择您要使用的AI模型</div>
      </div>
      
      <div class="form-group" id="customModelGroup" style="display: none;">
        <label for="customModel">自定义模型名称</label>
        <input type="text" id="customModel" placeholder="例如: my-model-v1">
        <div class="help-text">输入您的自定义模型名称</div>
      </div>
      
      
      <button type="submit" class="save-btn" id="saveBtn">保存设置</button>
    </form>
    
    <div id="status" class="status" style="display: none;"></div>
    
    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
      <h3 style="color: #333; font-size: 14px; margin-bottom: 10px;">数据管理</h3>
      <button type="button" class="clear-btn" id="clearCacheBtn" style="background-color: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%;">
        清除文章缓存
      </button>
      <div class="help-text" style="margin-top: 5px;">清除所有已转换的文章缓存，下次需要重新转换</div>
    </div>
    
    <div class="example">
      <strong>支持的API服务：</strong><br>
      • OpenAI GPT: https://api.openai.com/v1/chat/completions<br>
      • 其他兼容OpenAI API的服务<br><br>
      <strong>注意：</strong>请确保您的API密钥有足够的额度来调用服务。
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
